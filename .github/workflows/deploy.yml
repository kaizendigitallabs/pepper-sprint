name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    env:
      GIT_AUTHOR_NAME: ${{ secrets.VERCEL_DEPLOY_GIT_NAME }}
      GIT_AUTHOR_EMAIL: ${{ secrets.VERCEL_DEPLOY_GIT_EMAIL }}
      GIT_COMMITTER_NAME: ${{ secrets.VERCEL_DEPLOY_GIT_NAME }}
      GIT_COMMITTER_EMAIL: ${{ secrets.VERCEL_DEPLOY_GIT_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Set deployment author
        if: ${{ env.GIT_AUTHOR_NAME != '' && env.GIT_AUTHOR_EMAIL != '' }}
        run: |
          git commit --allow-empty -m "ci: deploy from GitHub Actions"
          git log -1 --format="Deploy commit: %H%nAuthor: %an <%ae>%nCommitter: %cn <%ce>"

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy source to Vercel
        run: vercel deploy ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --no-wait --token=${{ secrets.VERCEL_TOKEN }}
